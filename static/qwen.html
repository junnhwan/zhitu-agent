<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千言·AI智能助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --bg-hover: #e8edf3;
            --text-primary: #2c3e50;
            --text-secondary: #5a6c7d;
            --border-color: #e1e8ed;
            --ai-bubble: #f0f4f8;
            --user-bubble: #4a90e2;
            --user-text: #ffffff;
            --shadow: rgba(0, 0, 0, 0.08);
            --input-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1d23;
            --bg-secondary: #25282e;
            --bg-hover: #2f3339;
            --text-primary: #e4e6eb;
            --text-secondary: #b0b3b8;
            --border-color: #3a3d44;
            --ai-bubble: #2f3339;
            --user-bubble: #4a90e2;
            --user-text: #ffffff;
            --shadow: rgba(0, 0, 0, 0.3);
            --input-bg: #2f3339;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* 侧边栏样式 */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: background 0.3s, border-color 0.3s;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .app-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .theme-toggle:hover {
            background: var(--bg-hover);
        }

        .new-chat-btn {
            margin: 20px;
            padding: 12px 20px;
            background: var(--user-bubble);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .new-chat-btn:hover {
            opacity: 0.9;
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 15px;
        }

        .session-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            background: var(--bg-primary);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .session-item:hover {
            background: var(--bg-hover);
        }

        .session-item.active {
            background: var(--user-bubble);
            color: white;
        }

        .session-title {
            font-size: 14px;
            flex: 1;
        }

        .delete-btn {
            background: none;
            border: none;
            color: inherit;
            font-size: 18px;
            cursor: pointer;
            padding: 0 5px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .delete-btn:hover {
            opacity: 1;
        }

        /* 主聊天区域样式 */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }

        .message-list {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        .message {
            display: flex;
            margin-bottom: 25px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .message.ai .avatar {
            margin-right: 12px;
        }

        .message.user .avatar {
            margin-left: 12px;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message.ai .message-content {
            background: var(--ai-bubble);
            color: var(--text-primary);
        }

        .message.user .message-content {
            background: var(--user-bubble);
            color: var(--user-text);
        }

        /* 输入区域样式 */
        .input-area {
            padding: 20px 30px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-box {
            flex: 1;
            min-height: 44px;
            max-height: 120px;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text-primary);
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-box:focus {
            border-color: var(--user-bubble);
        }

        .send-btn {
            padding: 12px 24px;
            background: var(--user-bubble);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            opacity: 0.9;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="app-title">千言·AI智能助手</div>
            <button class="theme-toggle" id="themeToggle">🌙</button>
        </div>
        <button class="new-chat-btn" id="newChatBtn">+ 新建聊天</button>
        <div class="session-list" id="sessionList"></div>
    </div>

    <!-- 主聊天区 -->
    <div class="main-chat">
        <div class="message-list" id="messageList"></div>
        <div class="input-area">
            <div class="input-wrapper">
                    <textarea
                            class="input-box"
                            id="inputBox"
                            placeholder="输入消息... (Enter发送，Shift+Enter换行)"
                            rows="1"
                    ></textarea>
                <button class="send-btn" id="sendBtn">发送</button>
            </div>
        </div>
    </div>
</div>

<script>
    // AI头像 (Base64编码 - 简洁的机器人图标)
    const AI_AVATAR = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDgiIGhlaWdodD0iNDgiIHZpZXdCb3g9IjAgMCA0OCA0OCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPGNpcmNsZSBjeD0iMjQiIGN5PSIyNCIgcj0iMjQiIGZpbGw9IiM0YTkwZTIiLz4KPGNpcmNsZSBjeD0iMTciIGN5PSIyMCIgcj0iMyIgZmlsbD0id2hpdGUiLz4KPGNpcmNsZSBjeD0iMzEiIGN5PSIyMCIgcj0iMyIgZmlsbD0id2hpdGUiLz4KPHBhdGggZD0iTTE2IDMwIFEyNCAzNSAzMiAzMCIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIyIiBzdHJva2UtbGluZWNhcD0icm91bmQiIGZpbGw9Im5vbmUiLz4KPC9zdmc+';

    // 用户头像 (Base64编码 - 简洁的用户图标)
    const USER_AVATAR = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDgiIGhlaWdodD0iNDgiIHZpZXdCb3g9IjAgMCA0OCA0OCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPGNpcmNsZSBjeD0iMjQiIGN5PSIyNCIgcj0iMjQiIGZpbGw9IiM3ZGE4ZDkiLz4KPGNpcmNsZSBjeD0iMjQiIGN5PSIxOCIgcj0iNyIgZmlsbD0id2hpdGUiLz4KPHBhdGggZD0iTTEwIDM4IFExMiAyOCAyNCAyOCBRMzYgMjggMzggMzgiIGZpbGw9IndoaXRlIi8+Cjwvc3ZnPg==';

    // 全局状态
    let sessions = [];          // 会话列表
    let currentSessionId = null;// 当前激活的会话ID
    let userId = null;          // 用户唯一标识
    let abortController = null; // 用于中断流式请求的控制器

    // 初始化应用
    function init() {
        // 获取或生成用户ID
        userId = localStorage.getItem('userId');
        if (!userId) {
            userId = generateId();
            localStorage.setItem('userId', userId);
        }

        // 加载主题设置
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        // 加载会话数据
        const savedSessions = localStorage.getItem('sessions');
        if (savedSessions) {
            sessions = JSON.parse(savedSessions);
        }

        // 如果没有会话，创建新会话
        if (sessions.length === 0) {
            createNewSession();
        } else {
            currentSessionId = sessions[0].id;
            renderSessions();
            renderMessages();
        }

        // 绑定事件处理函数
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        document.getElementById('newChatBtn').addEventListener('click', createNewSession);
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('inputBox').addEventListener('keydown', handleKeyDown);
        document.getElementById('inputBox').addEventListener('input', autoResize);
    }

    // 生成6位随机ID
    function generateId() {
        return Math.floor(100000 + Math.random() * 900000);
    }

    // 创建新会话
    function createNewSession() {
        // 中断当前的流式请求
        if (abortController) {
            abortController.abort();
            abortController = null;
        }

        // 创建新会话对象
        const newSession = {
            id: generateId(),
            messages: []
        };

        // 添加到会话列表并设为当前会话
        sessions.unshift(newSession);
        currentSessionId = newSession.id;

        // 保存并渲染
        saveSessions();
        renderSessions();
        renderMessages();
    }

    // 删除会话
    function deleteSession(sessionId, event) {
        event.stopPropagation(); // 阻止事件冒泡

        // 查找会话索引
        const index = sessions.findIndex(s => s.id === sessionId);
        if (index === -1) return;

        // 如果删除的是当前会话且有正在进行的请求，中断请求
        if (sessionId === currentSessionId && abortController) {
            abortController.abort();
            abortController = null;
        }

        // 删除会话
        sessions.splice(index, 1);

        // 如果删除的是当前会话，切换到第一个会话或创建新会话
        if (sessionId === currentSessionId) {
            if (sessions.length > 0) {
                currentSessionId = sessions[0].id;
            } else {
                createNewSession();
                return;
            }
        }

        // 保存并重新渲染
        saveSessions();
        renderSessions();
        renderMessages();
    }

    // 切换会话
    function switchSession(sessionId) {
        // 中断当前的流式请求
        if (abortController) {
            abortController.abort();
            abortController = null;
        }

        // 切换到指定会话
        currentSessionId = sessionId;
        renderSessions();
        renderMessages();
    }

    // 渲染会话列表
    function renderSessions() {
        const list = document.getElementById('sessionList');
        list.innerHTML = sessions.map(session => `
                <div class="session-item ${session.id === currentSessionId ? 'active' : ''}"
                     onclick="switchSession(${session.id})">
                    <div class="session-title">会话 #${session.id}</div>
                    <button class="delete-btn" onclick="deleteSession(${session.id}, event)">×</button>
                </div>
            `).join('');
    }

    // 渲染消息列表
    function renderMessages() {
        const session = sessions.find(s => s.id === currentSessionId);
        if (!session) return;

        const list = document.getElementById('messageList');
        list.innerHTML = session.messages.map(msg => `
                <div class="message ${msg.role}">
                    <img class="avatar" src="${msg.role === 'ai' ? AI_AVATAR : USER_AVATAR}" alt="${msg.role}">
                    <div class="message-content">${escapeHtml(msg.content)}</div>
                </div>
            `).join('');

        // 滚动到底部
        list.scrollTop = list.scrollHeight;
    }

    // 发送消息
    async function sendMessage() {
        const input = document.getElementById('inputBox');
        const prompt = input.value.trim();

        // 空消息不发送
        if (!prompt) return;

        const session = sessions.find(s => s.id === currentSessionId);
        if (!session) return;

        // 添加用户消息到会话
        session.messages.push({ role: 'user', content: prompt });
        input.value = '';       // 清空输入框
        autoResize();           // 重置输入框高度
        renderMessages();       // 重新渲染消息列表

        // 添加AI占位消息
        const aiMessageIndex = session.messages.length;
        session.messages.push({ role: 'ai', content: '' });
        renderMessages();

        // 禁用发送按钮
        const sendBtn = document.getElementById('sendBtn');
        sendBtn.disabled = true;

        try {
            // 创建AbortController用于中断请求
            abortController = new AbortController();

            // 发送请求到后端API
            const response = await fetch('http://localhost:10010/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sessionId: currentSessionId,
                    userId: parseInt(userId),
                    prompt: prompt
                }),
                signal: abortController.signal
            });

            // 检查响应状态
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            // 处理流式响应
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                // 解码并拼接数据
                buffer += decoder.decode(value, { stream: true });

                // 按行处理SSE格式数据
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const content = line.slice(6);
                        if (content && content !== '[DONE]') {
                            session.messages[aiMessageIndex].content += content;
                            updateAIMessage(aiMessageIndex, session.messages[aiMessageIndex].content);
                        }
                    } else if (line.trim() && !line.startsWith(':')) {
                        // 处理普通文本数据
                        session.messages[aiMessageIndex].content += line;
                        updateAIMessage(aiMessageIndex, session.messages[aiMessageIndex].content);
                    }
                }
            }

            // 处理剩余的缓冲区数据
            if (buffer.trim()) {
                session.messages[aiMessageIndex].content += buffer;
                updateAIMessage(aiMessageIndex, session.messages[aiMessageIndex].content);
            }

            // 保存会话数据
            saveSessions();
        } catch (error) {
            if (error.name === 'AbortError') {
                console.log('请求已中断');
            } else {
                console.error('发送消息失败:', error);
                session.messages[aiMessageIndex].content = '抱歉，发生了错误，请稍后重试。';
                updateAIMessage(aiMessageIndex, session.messages[aiMessageIndex].content);
            }
        } finally {
            // 重置控制器并启用发送按钮
            abortController = null;
            sendBtn.disabled = false;
        }
    }

    // 更新AI消息显示
    function updateAIMessage(index, content) {
        const session = sessions.find(s => s.id === currentSessionId);
        if (!session) return;

        const messageList = document.getElementById('messageList');
        const messages = messageList.querySelectorAll('.message');

        if (messages[index]) {
            const contentDiv = messages[index].querySelector('.message-content');
            if (contentDiv) {
                contentDiv.textContent = content;
                // 自动滚动到底部
                messageList.scrollTop = messageList.scrollHeight;
            }
        }
    }

    // 保存会话到本地存储
    function saveSessions() {
        localStorage.setItem('sessions', JSON.stringify(sessions));
    }

    // 切换主题（亮色/暗色）
    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const newTheme = current === 'dark' ? 'light' : 'dark';

        // 更新主题设置
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeIcon(newTheme);
    }

    // 更新主题切换按钮图标
    function updateThemeIcon(theme) {
        document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
    }

    // 处理键盘事件
    function handleKeyDown(e) {
        // Enter发送消息，Shift+Enter换行
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    // 自动调整输入框高度
    function autoResize() {
        const input = document.getElementById('inputBox');
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    }

    // HTML转义，防止XSS攻击
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // 启动应用
    init();
</script>
</body>
</html>
